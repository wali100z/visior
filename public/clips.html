<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Clips — Visior</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23080808'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='16' font-weight='700' text-anchor='middle' fill='%23b8f559'%3EVi%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Syne:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #111;
  --border: rgba(255,255,255,0.08);
  --green: #b8f559;
  --white: #f0ede8;
  --gray: #5a5a5a;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Syne', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px; opacity: 0.4;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 3rem;
  background: rgba(8,8,8,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 700;
  letter-spacing: -0.02em; color: var(--white);
  text-decoration: none;
}
.logo span { color: var(--green); }
.back {
  font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gray); text-decoration: none;
  transition: color 0.2s;
}
.back:hover { color: var(--white); }

/* HERO */
.hero {
  position: relative; z-index: 1;
  padding: 4rem 3rem 2rem;
  border-bottom: 1px solid var(--border);
}
.hero-eye {
  font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--green); margin-bottom: 1rem;
  display: flex; align-items: center; gap: 0.75rem;
}
.hero-eye::before {
  content: ''; width: 24px; height: 1px; background: var(--green);
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 400; letter-spacing: -0.03em; line-height: 1.1;
}
.hero h1 em { font-style: italic; color: var(--green); }
.hero-meta {
  margin-top: 0.75rem;
  font-size: 0.8rem; color: var(--gray);
}

/* LOADING */
.loading {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 8rem 2rem; text-align: center;
}
.spinner {
  width: 40px; height: 40px;
  border: 2px solid rgba(184,245,89,0.15);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin-bottom: 2rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading h2 {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 400;
  margin-bottom: 0.5rem;
}
.loading p { font-size: 0.82rem; color: var(--gray); }

/* CLIPS */
.clips-wrap {
  position: relative; z-index: 1;
  padding: 3rem;
}
.clips-count {
  font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gray); margin-bottom: 2rem;
}

.clips-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
}

.clip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px; overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.clip-card:hover {
  border-color: rgba(184,245,89,0.2);
  transform: translateY(-2px);
}

video {
  width: 100%; aspect-ratio: 9/16;
  background: #000; display: block;
  max-height: 400px; object-fit: cover;
}

.clip-info {
  padding: 1rem 1.1rem;
  border-top: 1px solid var(--border);
}
.clip-title {
  font-size: 0.85rem; font-weight: 500;
  margin-bottom: 0.25rem;
}
.clip-time {
  font-size: 0.72rem; color: var(--gray);
  margin-bottom: 1rem;
}
.clip-actions { display: flex; gap: 0.6rem; }

.btn-dl {
  flex: 1; background: var(--green); color: #080808;
  font-family: var(--font-body); font-weight: 500;
  font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.65rem; border: none; border-radius: 2px;
  cursor: pointer; text-align: center; text-decoration: none;
  transition: opacity 0.2s;
}
.btn-dl:hover { opacity: 0.85; }

.btn-share {
  background: transparent; color: var(--white);
  font-family: var(--font-body); font-weight: 400;
  font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.65rem 1rem;
  border: 1px solid var(--border); border-radius: 2px;
  cursor: pointer; transition: border-color 0.2s;
}
.btn-share:hover { border-color: rgba(255,255,255,0.3); }

/* EMPTY */
.empty {
  position: relative; z-index: 1;
  text-align: center; padding: 8rem 2rem;
}
.empty h2 {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 400; margin-bottom: 0.75rem;
}
.empty p { color: var(--gray); font-size: 0.85rem; margin-bottom: 2rem; }
.btn-back {
  display: inline-block;
  background: var(--green); color: #080808;
  font-family: var(--font-body); font-weight: 500;
  font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.9rem 2rem; border-radius: 2px; text-decoration: none;
  transition: opacity 0.2s;
}
.btn-back:hover { opacity: 0.85; }

.pulse {
  display: inline-block; width: 6px; height: 6px;
  background: var(--green); border-radius: 50%;
  margin-right: 0.5rem;
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
}

@media (max-width: 600px) {
  nav, .hero, .clips-wrap { padding-left: 1.5rem; padding-right: 1.5rem; }
  .clips-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Vi<span>.</span>sior</a>
  <a href="/" class="back">← New search</a>
</nav>

<div class="hero">
  <div class="hero-eye">Your highlights</div>
  <h1>Clips <em>ready.</em></h1>
  <p class="hero-meta" id="hero-meta">Loading...</p>
</div>

<div id="main">
  <div class="loading">
    <div class="spinner"></div>
    <h2>Finding your moments</h2>
    <p>AI is scanning the match for you...</p>
  </div>
</div>

<script>
  const params      = new URLSearchParams(window.location.search);
  const shirt       = params.get('shirt') || '?';
  const color       = params.get('color') || '?';
  const jobId       = params.get('job');
  let   pollTimer   = null;

  document.getElementById('hero-meta').textContent =
    'Player #' + shirt + ' \u2022 ' + color + ' jersey';

  async function loadClips() {
    try {
      let clips = [];

      if (jobId) {
        const res  = await fetch('/api/status/' + jobId);
        const data = await res.json();
        if (data.status === 'done') clips = data.clips || [];
        else if (data.status === 'processing') return; // keep polling
        else showEmpty();
      } else {
        const res  = await fetch('/api/clips-list');
        const data = await res.json();
        clips = data.clips || [];
      }

      if (clips.length === 0) { showEmpty(); return; }
      clearInterval(pollTimer);
      showClips(clips);
    } catch(e) {
      showEmpty();
    }
  }

  function showClips(clips) {
    let html = '<div class="clips-wrap"><div class="clips-count">' + clips.length + ' clip' + (clips.length !== 1 ? 's' : '') + ' found</div><div class="clips-grid">';

    clips.forEach((url, i) => {
      const filename = url.split('/').pop();
      const mins     = Math.floor((i * 7) + 2);
      html += '<div class="clip-card">' +
        '<video controls preload="metadata" playsinline>' +
        '<source src="' + url + '" type="video/mp4"/>' +
        '</video>' +
        '<div class="clip-info">' +
        '<div class="clip-title">Clip ' + (i+1) + ' \u2014 #' + shirt + '</div>' +
        '<div class="clip-time">~' + mins + '\' into the match \u2022 ' + color + ' jersey</div>' +
        '<div class="clip-actions">' +
        '<a class="btn-dl" href="' + url + '" download="' + filename + '">Download</a>' +
        '<button class="btn-share" onclick="share(\'' + url + '\',' + (i+1) + ')">Share</button>' +
        '</div></div></div>';
    });

    html += '</div></div>';
    document.getElementById('main').innerHTML = html;
  }

  function showEmpty() {
    clearInterval(pollTimer);
    document.getElementById('main').innerHTML =
      '<div class="empty">' +
      '<h2>No clips found</h2>' +
      '<p>We couldn\'t find player #' + shirt + ' in this match.<br/>Try checking the shirt number or jersey color.</p>' +
      '<a href="/" class="btn-back">Try again</a>' +
      '</div>';
  }

  async function share(url, num) {
    if (navigator.share) {
      try { await navigator.share({ title: 'Visior Clip ' + num, url }); } catch(e) {}
    } else {
      await navigator.clipboard.writeText(url);
      alert('Link copied!');
    }
  }

  // Poll every 4 seconds
  pollTimer = setInterval(loadClips, 4000);
  loadClips();
</script>
</body>
</html>
