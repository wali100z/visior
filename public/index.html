<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visior</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Syne:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #111;
  --border: rgba(255,255,255,0.08);
  --green: #b8f559;
  --white: #f0ede8;
  --gray: #5a5a5a;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Syne', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  overflow-x: hidden;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: 0.4;
}

/* LAYOUT */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2rem 3rem;
}
.logo {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--white);
}
.logo span { color: var(--green); }
.nav-tag {
  font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gray);
}

/* MAIN */
main {
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1.5rem;
}

.card {
  width: 100%; max-width: 480px;
}

.card-eyebrow {
  font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--green); margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 0.75rem;
}
.card-eyebrow::before {
  content: ''; display: block;
  width: 24px; height: 1px; background: var(--green);
}

.card h1 {
  font-family: var(--font-display);
  font-size: clamp(2.2rem, 6vw, 3.2rem);
  font-weight: 400; line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 0.5rem;
}
.card h1 em { font-style: italic; color: var(--green); }

.card-sub {
  font-size: 0.85rem; color: var(--gray);
  line-height: 1.7; margin-bottom: 2.5rem;
}

/* FORM */
.form { display: flex; flex-direction: column; gap: 1rem; }

.field { display: flex; flex-direction: column; gap: 0.4rem; }

label {
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gray);
}

input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: var(--font-body);
  font-size: 0.95rem; font-weight: 300;
  padding: 0.9rem 1rem;
  border-radius: 3px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
input:focus { border-color: rgba(184,245,89,0.4); }
input::placeholder { color: var(--gray); font-size: 0.85rem; }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.btn {
  margin-top: 0.5rem;
  background: var(--green);
  color: #080808;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 1.1rem;
  border: none; border-radius: 3px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* STATUS BOX */
.status {
  margin-top: 1rem;
  padding: 1rem 1.1rem;
  border-radius: 3px;
  font-size: 0.82rem;
  line-height: 1.7;
  border: 1px solid;
  display: none;
}
.status.show { display: block; }
.status.loading {
  background: rgba(255,255,255,0.03);
  border-color: var(--border);
  color: var(--gray);
}
.status.error {
  background: rgba(255,80,80,0.05);
  border-color: rgba(255,80,80,0.2);
  color: #ff9090;
}
.status.success {
  background: rgba(184,245,89,0.05);
  border-color: rgba(184,245,89,0.2);
  color: var(--green);
}

/* FOOTER */
footer {
  padding: 2rem 3rem;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--border);
}
footer p { font-size: 0.7rem; color: var(--gray); letter-spacing: 0.05em; }

/* PULSE DOT */
.pulse {
  display: inline-block; width: 6px; height: 6px;
  background: var(--green); border-radius: 50%;
  margin-right: 0.5rem;
  animation: pulse 1.5s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

/* FADE IN */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-eyebrow { animation: fadeUp 0.5s ease both; }
.card h1      { animation: fadeUp 0.5s 0.1s ease both; }
.card-sub     { animation: fadeUp 0.5s 0.15s ease both; }
.form         { animation: fadeUp 0.5s 0.2s ease both; }

@media (max-width: 500px) {
  nav, footer { padding: 1.5rem; }
  .row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">

  <nav>
    <div class="logo">Vi<span>.</span>sior</div>
    <div class="nav-tag">AI Highlight Generator</div>
  </nav>

  <main>
    <div class="card">
      <div class="card-eyebrow">For the next gen ballers</div>
      <h1>Your match.<br/><em>Your clips.</em></h1>
      <p class="card-sub">Paste your VEO link, tell us your number and color — we find every moment you touched the ball.</p>

      <div class="form">
        <div class="field">
          <label>VEO match link</label>
          <input type="url" id="veoLink" placeholder="https://app.veo.co/matches/..."/>
        </div>

        <div class="row">
          <div class="field">
            <label>Shirt number</label>
            <input type="number" id="shirtNumber" placeholder="e.g. 10" min="1" max="99"/>
          </div>
          <div class="field">
            <label>Jersey color</label>
            <input type="text" id="jerseyColor" placeholder="e.g. yellow, navy blue"/>
          </div>
        </div>

        <button class="btn" id="submitBtn" onclick="handleSubmit()">Find my clips</button>

        <div class="status" id="status"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Visior</p>
    <p>Built for ballers</p>
  </footer>

</div>

<script>
  async function handleSubmit() {
    const veoLink     = document.getElementById('veoLink').value.trim();
    const shirtNumber = document.getElementById('shirtNumber').value.trim();
    const jerseyColor = document.getElementById('jerseyColor').value.trim().toLowerCase();
    const btn         = document.getElementById('submitBtn');

    if (!veoLink)     return showStatus('error', 'Please paste your VEO match link.');
    if (!shirtNumber) return showStatus('error', 'Please enter your shirt number.');
    if (!jerseyColor) return showStatus('error', 'Please enter your jersey color.');

    btn.textContent = 'Downloading match...';
    btn.disabled = true;
    showStatus('loading', '<span class="pulse"></span>Downloading your match — this takes about a minute...');

    try {
      const res  = await fetch('/api/find-player', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ veoLink, shirtNumber, jerseyColor }),
      });
      const data = await res.json();

      if (data.success && data.jobId) {
        showStatus('loading', '<span class="pulse"></span>Match downloaded! AI is scanning for player #' + shirtNumber + '...');
        btn.textContent = 'Scanning...';
        pollStatus(data.jobId, shirtNumber, jerseyColor);
      } else {
        showStatus('error', data.error || 'Something went wrong.');
        btn.textContent = 'Find my clips';
        btn.disabled = false;
      }
    } catch(err) {
      showStatus('error', 'Could not connect. Make sure the server is running.');
      btn.textContent = 'Find my clips';
      btn.disabled = false;
    }
  }

  function pollStatus(jobId, shirtNumber, jerseyColor) {
    const interval = setInterval(async () => {
      try {
        const res  = await fetch('/api/status/' + jobId);
        const data = await res.json();
        if (data.status === 'done') {
          clearInterval(interval);
          window.location.href = '/clips.html?shirt=' + shirtNumber + '&color=' + jerseyColor + '&job=' + jobId;
        } else if (data.status === 'error') {
          clearInterval(interval);
          showStatus('error', 'AI error: ' + data.error);
          const btn = document.getElementById('submitBtn');
          btn.textContent = 'Find my clips';
          btn.disabled = false;
        }
      } catch(e) {}
    }, 4000);
  }

  function showStatus(type, message) {
    const box = document.getElementById('status');
    box.className = 'status show ' + type;
    box.innerHTML = message;
  }
</script>
</body>
</html>
